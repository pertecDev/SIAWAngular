<div class="p-2">
  <h1 mat-dialog-title>Crear Vehículo</h1>
  <div style="font-size: 0.6rem;padding: 0 24px 0px;">Los campos (*) son obligatorios</div>
</div>

<div mat-dialog-content>
  <div class="container">
    <form class="example-form" [formGroup]="FormularioDataEdit" (ngSubmit)="submitData()">
      <div class="row mb-2">
        <div class="col-md">
          <mat-form-field appearance="outline" class="example-full-small">
            <mat-label>Placa </mat-label>
            <input matInput type="text" formControlName="placa" [(ngModel)]="vehiculo_edit.placa" maxlength="7" required>
          </mat-form-field>
        </div>
        <div class="col-md">
          <mat-form-field appearance="outline" class="example-full-width">
            <mat-label>Descripción </mat-label>
            <input type="text" matInput formControlName="descripcion" [(ngModel)]="vehiculo_edit.descripcion"  maxlength="50" required>
          </mat-form-field>
        </div>
        <div class="col-md">
          <mat-checkbox class="example-margin" [(ngModel)]="vehiculo_edit.activo"  formControlName="activo">Activo</mat-checkbox>
        </div>
      </div>

      <div class="mat-dialog-actions" mat-dialog-actions>
        <button mat-raised-button color="primary" [disabled]="!FormularioDataEdit.valid" type="submit"><i
          class="fa fa-save"></i> Guardar</button>
      </div>
    </form>
    <button mat-button (click)="onNoClick()"><i class="fa fa-arrow-left"></i> Atras</button>
  </div>
</div>
